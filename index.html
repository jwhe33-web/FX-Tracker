<body>
<div class="wrap">
  <p class="eyebrow">FX / Cross Rates</p>
  <h1>Exchange Rate Matrix</h1>
  <p class="sub">
    Daily rates via <a href="https://github.com/fawazahmed0/exchange-api" target="_blank">fawazahmed0/exchange-api</a>
    · historical since 2020
  </p>

  <div class="controls">
    <input type="date" id="di"/>
    <button id="btn-pull">Pull Rates</button>
    <button id="btn-today">Latest</button>
  </div>
  <div id="ww" class="notice" style="display:none">⚠ Weekend/holiday — will return nearest prior trading day's rates.</div>
  <div id="sp" class="spinner-row" style="display:none"><div class="spinner"></div><span>Fetching rates…</span></div>
  <div id="eb" class="err-box" style="display:none"></div>
  <div id="mw" style="display:none">
    <div class="matrix-date" id="mh"></div>
    <div class="table-wrap"><table id="mt"></table></div>
    <div class="footer">Source: <span>fawazahmed0/exchange-api (CDN)</span> · <span>Hover cell for pair</span></div>
  </div>
</div>

<script>
const BASE = ["GBP","CHF","EUR"];
const ROWS = ["USD","DKK","EUR","CHF","GBP","BRL"];
const FLAG = {GBP:"🇬🇧",CHF:"🇨🇭",EUR:"🇪🇺",USD:"🇺🇸",DKK:"🇩🇰",BRL:"🇧🇷"};
const NAME = {GBP:"Sterling",CHF:"Franc",EUR:"Euro",USD:"Dollar",DKK:"Krone",BRL:"Real"};

const $di  = document.getElementById("di");
const $pull= document.getElementById("btn-pull");
const $tod = document.getElementById("btn-today");
const $ww  = document.getElementById("ww");
const $sp  = document.getElementById("sp");
const $eb  = document.getElementById("eb");
const $mw  = document.getElementById("mw");
const $mh  = document.getElementById("mh");
const $mt  = document.getElementById("mt");

function todayStr() { return new Date().toISOString().split("T")[0]; }
function isWeekend(s) { const d=new Date(s).getUTCDay(); return d===0||d===6; }

$di.max = todayStr();
$di.min = "2020-01-01";
$di.value = todayStr();

$di.addEventListener("change", ()=>{ $ww.style.display=isWeekend($di.value)?"block":"none"; });
$di.addEventListener("keydown", e=>{ if(e.key==="Enter") load($di.value); });
$pull.addEventListener("click", ()=>load($di.value));
$tod.addEventListener("click", ()=>{ $di.value=todayStr(); load(todayStr()); });

function setLoading(on) {
  $pull.disabled=$tod.disabled=on;
  $sp.style.display=on?"flex":"none";
}
function showErr(msg) {
  $eb.textContent="⚠ "+msg; $eb.style.display="block"; $mw.style.display="none";
}

async function fetchForBase(base, date) {
  const b = base.toLowerCase();
  const dateTag = (date === todayStr()) ? "latest" : date;
  const urls = [
    `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${dateTag}/v1/currencies/${b}.json`,
    `https://${dateTag}.currency-api.pages.dev/v1/currencies/${b}.json`,
  ];
  let lastErr = null;
  for (const url of urls) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) { lastErr = `HTTP ${resp.status}`; continue; }
      const data = await resp.json();
      return { date: data.date, rates: data[b] };
    } catch(e) { lastErr = e.message; }
  }
  throw new Error(`Could not fetch ${base} for ${dateTag}: ${lastErr}`);
}

async function load(date) {
  setLoading(true);
  $eb.style.display="none";
  $mw.style.display="none";

  try {
    const [gbp, chf, eur] = await Promise.all([
      fetchForBase("GBP", date),
      fetchForBase("CHF", date),
      fetchForBase("EUR", date),
    ]);

    const resolvedDate = gbp.date;
    const lookup = { GBP: gbp.rates, CHF: chf.rates, EUR: eur.rates };
    const matrix = {};
    for (const col of BASE) {
      matrix[col] = {};
      for (const row of ROWS) {
        if (col === row) { matrix[col][row] = 1.0; continue; }
        const r = lookup[col][row.toLowerCase()];
        matrix[col][row] = r != null ? r : null;
      }
    }

    renderMatrix(matrix, resolvedDate, date);
  } catch(e) {
    showErr(e.message);
  } finally {
    setLoading(false);
  }
}

function renderMatrix(matrix, resolvedDate, requestedDate) {
  let hdr = `<span class="gold">${resolvedDate}</span>`;
  if (resolvedDate !== requestedDate) {
    hdr += ` <span class="amber">(requested: ${requestedDate})</span>`;
  }
  hdr += " &nbsp;·&nbsp; 1 unit of column → row currency";
  $mh.innerHTML = hdr;

  let html = "<thead><tr><th>↓ / →</th>";
  for (const col of BASE) {
    html += `<th><span class="cflag">${FLAG[col]}</span><span class="ccode">${col}</span><div class="cname">${NAME[col]}</div></th>`;
  }
  html += "</tr></thead><tbody>";

  for (const row of ROWS) {
    html += `<tr><td><div style="display:flex;align-items:center;gap:9px">
      <span class="rflag">${FLAG[row]}</span>
      <div><div class="rcode">${row}</div><div class="rname">${NAME[row]}</div></div>
    </div></td>`;
    for (const col of BASE) {
      const r = matrix[col][row];
      const diag = row === col;
      const fmt = r != null ? Number(r).toFixed(4) : "—";
      const lbl = (!diag && r != null) ? `1 ${col} = ${fmt} ${row}` : "";
      html += `<td class="rc${diag?" diag":""}">
        <div class="rv">${fmt}</div>
        ${lbl?`<div class="rl">${lbl}</div>`:""}
      </td>`;
    }
    html += "</tr>";
  }
  html += "</tbody>";
  $mt.innerHTML = html;

  $mw.style.display = "block";
  $mw.classList.remove("fade");
  void $mw.offsetWidth;
  $mw.classList.add("fade");
}

load(todayStr());
</script>

</body>
